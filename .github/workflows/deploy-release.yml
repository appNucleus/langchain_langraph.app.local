name: Deploy release to LangChain LangGraph app server

on:
  push:
    branches:
      - release

permissions:
  contents: read

concurrency:
  group: langchain-langraph-app-production-release
  cancel-in-progress: false

env:
  CONTAINER_NAME: langchain-langraph-app
  RELEASE_IMAGE: langchain_langraph.app:release
  ROLLBACK_IMAGE: langchain_langraph.app:rollback

jobs:
  quality-gate:
    name: Unit, integration, and lint gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out release commit
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q app tests

      - name: Run correctness lint gate
        run: python -m ruff check app tests

      - name: Run unit and deterministic integration tests
        run: |
          set -euo pipefail
          python -m pytest -q -m "not live_integration" \
            --junitxml=test-results/pytest.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-results-${{ github.sha }}
          path: test-results/pytest.xml
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    name: Build, deploy, verify, and roll back on failure
    needs: quality-gate
    runs-on:
      - self-hosted
      - Linux
      - X64
      - app-prod
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out tested release commit
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Configure deployment paths
        run: |
          set -euo pipefail
          {
            echo "BACKUP_ROOT=$HOME/backup_app.local"
            echo "DEPLOY_ENV_FILE=$HOME/.config/langchain-langraph-app/runtime.env"
            echo "ROLLBACK_STATE_DIR=$RUNNER_TEMP/langchain-langraph-app-rollback"
          } >> "$GITHUB_ENV"

      - name: Verify deployment prerequisites
        run: |
          set -euo pipefail
          echo "Checking shell-script syntax..."
          for script in scripts/*.sh; do
            echo "Checking: $script"
            bash -n "$script"
          done
          bash ./scripts/verify-server.sh
          command -v tar >/dev/null 2>&1
          command -v sha256sum >/dev/null 2>&1
          command -v curl >/dev/null 2>&1
          command -v python3 >/dev/null 2>&1

      - name: Initialize persistent deployment environment
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$DEPLOY_ENV_FILE")"
          if [[ ! -f "$DEPLOY_ENV_FILE" ]]; then
            install -m 600 .env.example "$DEPLOY_ENV_FILE"
          else
            chmod 600 "$DEPLOY_ENV_FILE"
          fi
          set_runtime_env_value() {
            local key="$1" value="$2" file="$3"
            if grep -qE "^${key}=" "$file"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$file"
            else
              printf '\n%s=%s\n' "$key" "$value" >> "$file"
            fi
          }
          set_runtime_env_value HOST_BIND 127.0.0.1 "$DEPLOY_ENV_FILE"
          set_runtime_env_value APP_PORT 8001 "$DEPLOY_ENV_FILE"

      - name: Validate candidate Compose configuration
        run: docker compose --env-file "$DEPLOY_ENV_FILE" config >/dev/null

      - name: Prepare rollback point
        id: prepare_rollback
        run: bash ./scripts/prepare-rollback.sh

      - name: Build candidate image
        run: docker compose --env-file "$DEPLOY_ENV_FILE" build --pull

      - name: Deploy candidate
        run: |
          set -euo pipefail
          docker compose --env-file "$DEPLOY_ENV_FILE" up \
            --detach \
            --no-build \
            --force-recreate \
            --remove-orphans \
            --wait \
            --wait-timeout 120

      - name: Run candidate smoke test
        run: bash ./scripts/smoke-test.sh candidate

      - name: Run post-deployment API integration test
        run: bash ./scripts/post-deploy-integration-test.sh

      - name: Replace successful deployment backup
        run: bash ./scripts/create-success-backup.sh

      - name: Remove previous deployment image
        if: ${{ success() }}
        run: |
          set -u
          docker image rm "$ROLLBACK_IMAGE" >/dev/null 2>&1 || true
          docker image prune --force || true

      - name: Roll back failed deployment
        id: rollback
        if: ${{ failure() && !cancelled() && steps.prepare_rollback.outcome == 'success' }}
        run: bash ./scripts/rollback-release.sh

      - name: Explain why rollback was not attempted
        if: ${{ failure() && !cancelled() && steps.prepare_rollback.outcome != 'success' }}
        run: |
          echo "::notice::Rollback was not attempted because deployment had not modified the running service."

      - name: Show final deployment status
        if: ${{ always() }}
        run: |
          set +e
          deploy_env_file="${DEPLOY_ENV_FILE:-$HOME/.config/langchain-langraph-app/runtime.env}"
          docker compose --env-file "$deploy_env_file" ps
          docker compose --env-file "$deploy_env_file" logs --no-color --tail=100
          docker image ls langchain_langraph.app || true

      - name: Write deployment summary
        if: ${{ always() }}
        env:
          FINAL_JOB_STATUS: ${{ job.status }}
          PREPARE_ROLLBACK_OUTCOME: ${{ steps.prepare_rollback.outcome }}
          ROLLBACK_STEP_OUTCOME: ${{ steps.rollback.outcome }}
        run: |
          set -euo pipefail
          {
            echo "## LangChain LangGraph app deployment"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Quality gate: **passed**"
            echo "- Deployment result: **$FINAL_JOB_STATUS**"
            echo "- Rollback point: **${PREPARE_ROLLBACK_OUTCOME:-not run}**"
            echo "- Rollback step: **${ROLLBACK_STEP_OUTCOME:-not run}**"
            if [[ "$FINAL_JOB_STATUS" == "success" ]]; then
              echo "- Candidate passed smoke and API integration tests."
            else
              echo "- Candidate failed after deployment; automatic rollback was attempted when a rollback point existed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
