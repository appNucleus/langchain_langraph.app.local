name: Deploy release to LangChain LangGraph app server

on:
  push:
    branches:
      - release

permissions:
  contents: read

concurrency:
  group: langchain-langraph-app-production-release
  cancel-in-progress: false

env:
  CONTAINER_NAME: langchain-langraph-app
  RELEASE_IMAGE: langchain_langraph.app:release
  ROLLBACK_IMAGE: langchain_langraph.app:rollback

jobs:
  pre-deployment:
    name: "Pre-deployment: compile, lint, and test"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out release commit
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q app tests

      - name: Run correctness lint gate
        run: python -m ruff check app tests

      - name: Run unit and deterministic integration tests
        run: |
          set -euo pipefail
          python -m pytest -v -ra --tb=long -W default             -m "not live_integration"             --junitxml=test-results/pytest.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-results-${{ github.sha }}
          path: test-results/pytest.xml
          if-no-files-found: ignore
          retention-days: 14

  deployment:
    name: "Deployment: build and release"
    needs: pre-deployment
    runs-on:
      - self-hosted
      - Linux
      - X64
      - app-prod
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out tested release commit
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Configure deployment paths
        run: |
          set -euo pipefail
          {
            echo "BACKUP_ROOT=$HOME/backup_app.local"
            echo "DEPLOY_ENV_FILE=$HOME/.config/langchain-langraph-app/runtime.env"
            echo "ROLLBACK_STATE_DIR=$HOME/.cache/langchain-langraph-app/rollback-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "$GITHUB_ENV"

      - name: Verify deployment prerequisites
        run: |
          set -euo pipefail
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          bash ./scripts/verify-server.sh
          command -v tar >/dev/null 2>&1
          command -v sha256sum >/dev/null 2>&1
          command -v curl >/dev/null 2>&1
          command -v python3 >/dev/null 2>&1

      - name: Initialize persistent deployment environment
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$DEPLOY_ENV_FILE")"
          if [[ ! -f "$DEPLOY_ENV_FILE" ]]; then
            install -m 600 .env.example "$DEPLOY_ENV_FILE"
          else
            chmod 600 "$DEPLOY_ENV_FILE"
          fi
          set_runtime_env_value() {
            local key="$1" value="$2" file="$3"
            if grep -qE "^${key}=" "$file"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$file"
            else
              printf '\n%s=%s\n' "$key" "$value" >> "$file"
            fi
          }
          set_runtime_env_value HOST_BIND 127.0.0.1 "$DEPLOY_ENV_FILE"
          set_runtime_env_value APP_PORT 8001 "$DEPLOY_ENV_FILE"

      - name: Validate candidate Compose configuration
        run: docker compose --env-file "$DEPLOY_ENV_FILE" config >/dev/null

      - name: Prepare rollback point
        run: bash ./scripts/prepare-rollback.sh

      - name: Build candidate image
        run: docker compose --env-file "$DEPLOY_ENV_FILE" build --pull

      - name: Release candidate
        run: |
          set -euo pipefail
          docker compose --env-file "$DEPLOY_ENV_FILE" up             --detach             --no-build             --force-recreate             --remove-orphans             --wait             --wait-timeout 120

  post-deployment:
    name: "Post-deployment: smoke, API checks, backup, and rollback"
    needs:
      - pre-deployment
      - deployment
    if: ${{ always() && needs.pre-deployment.result == 'success' }}
    runs-on:
      - self-hosted
      - Linux
      - X64
      - app-prod
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out tested release commit
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Configure post-deployment paths
        run: |
          set -euo pipefail
          {
            echo "BACKUP_ROOT=$HOME/backup_app.local"
            echo "DEPLOY_ENV_FILE=$HOME/.config/langchain-langraph-app/runtime.env"
            echo "ROLLBACK_STATE_DIR=$HOME/.cache/langchain-langraph-app/rollback-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "$GITHUB_ENV"

      - name: Stop when deployment did not complete
        if: ${{ needs.deployment.result != 'success' }}
        run: |
          echo "::error::The deployment job did not complete successfully."
          exit 1

      - name: Run candidate smoke test
        if: ${{ needs.deployment.result == 'success' }}
        run: bash ./scripts/smoke-test.sh candidate

      - name: Run post-deployment API integration test
        if: ${{ needs.deployment.result == 'success' }}
        run: bash ./scripts/post-deploy-integration-test.sh

      - name: Replace successful deployment backup
        if: ${{ success() && needs.deployment.result == 'success' }}
        run: bash ./scripts/create-success-backup.sh

      - name: Remove previous deployment image
        if: ${{ success() && needs.deployment.result == 'success' }}
        run: |
          set -u
          docker image rm "$ROLLBACK_IMAGE" >/dev/null 2>&1 || true
          docker image prune --force || true

      - name: Roll back failed deployment
        id: rollback
        if: ${{ failure() && !cancelled() }}
        run: bash ./scripts/rollback-release.sh

      - name: Show final deployment status
        if: ${{ always() }}
        run: |
          set +e
          docker compose --env-file "$DEPLOY_ENV_FILE" ps
          docker compose --env-file "$DEPLOY_ENV_FILE" logs --no-color --tail=200
          docker image ls langchain_langraph.app || true

      - name: Write deployment summary
        if: ${{ always() }}
        env:
          PRE_DEPLOYMENT_RESULT: ${{ needs.pre-deployment.result }}
          DEPLOYMENT_RESULT: ${{ needs.deployment.result }}
          POST_DEPLOYMENT_RESULT: ${{ job.status }}
          ROLLBACK_RESULT: ${{ steps.rollback.outcome }}
        run: |
          set -euo pipefail
          {
            echo "## LangChain LangGraph app deployment"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Pre-deployment: **$PRE_DEPLOYMENT_RESULT**"
            echo "- Deployment: **$DEPLOYMENT_RESULT**"
            echo "- Post-deployment: **$POST_DEPLOYMENT_RESULT**"
            echo "- Rollback: **${ROLLBACK_RESULT:-not run}**"
          } >> "$GITHUB_STEP_SUMMARY"
